{% extends "base.html" %}

{% block title %}Excluir categoria | LV JIU JITSU{% endblock %}

{% block content %}
<section class="form-card">
    <p class="form-eyebrow">Gestão de categorias</p>
    <h1>Excluir categoria</h1>
    <p class="danger-copy">Confirme a exclusão de <strong>{{ object.display_name }}</strong>.</p>
    <form method="post" class="button-row">
        {% csrf_token %}
        <a class="ghost-link" href="{% url 'system:class-category-list' %}">Cancelar</a>
        <button type="submit" class="danger-button">Excluir</button>
    </form>
</section>
{% endblock %}
