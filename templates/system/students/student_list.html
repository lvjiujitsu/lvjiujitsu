<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>Gestao de Alunos</title>
</head>
<body>
    <main>
        <h1>Gestao de alunos e dependentes</h1>

        <form method="get">
            <p>
                <label for="id_name">Nome</label>
                <input id="id_name" type="text" name="name" value="{{ request.GET.name }}">
            </p>
            <p>
                <label for="id_cpf">CPF</label>
                <input id="id_cpf" type="text" name="cpf" value="{{ request.GET.cpf }}">
            </p>
            <p>
                <label for="id_status">Status</label>
                <input id="id_status" type="text" name="status" value="{{ request.GET.status }}">
            </p>
            <p>
                <label for="id_responsible">Responsavel</label>
                <input id="id_responsible" type="text" name="responsible" value="{{ request.GET.responsible }}">
            </p>
            <button type="submit">Filtrar</button>
        </form>

        <p><a href="{% url 'system:onboarding-holder' %}">Novo cadastro</a></p>

        <table>
            <thead>
                <tr>
                    <th>Aluno</th>
                    <th>CPF</th>
                    <th>Tipo</th>
                    <th>Status</th>
                    <th>Acoes</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                    <tr>
                        <td>{{ student.user.full_name }}</td>
                        <td>{{ student.user.cpf }}</td>
                        <td>{{ student.get_student_type_display }}</td>
                        <td>{{ student.get_operational_status_display }}</td>
                        <td><a href="{% url 'system:student-update' student.uuid %}">Editar</a></td>
                    </tr>
                {% empty %}
                    <tr>
                        <td colspan="5">Nenhum aluno encontrado.</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>
</body>
</html>
