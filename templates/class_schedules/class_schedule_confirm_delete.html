{% extends "base.html" %}

{% block title %}Excluir horário | LV JIU JITSU{% endblock %}

{% block content %}
<section class="form-card">
    <p class="form-eyebrow">Gestão de horários</p>
    <h1>Excluir horário</h1>
    <p class="danger-copy">Confirme a exclusão do horário <strong>{{ object }}</strong>.</p>
    <form method="post" class="button-row">
        {% csrf_token %}
        <a class="ghost-link" href="{% url 'system:class-schedule-list' %}">Cancelar</a>
        <button type="submit" class="danger-button">Excluir</button>
    </form>
</section>
{% endblock %}
