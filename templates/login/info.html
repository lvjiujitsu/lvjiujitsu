{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LV JIU JITSU | Informa&ccedil;&otilde;es</title>
  <link rel="stylesheet" href="{% static 'system/css/login.css' %}">
</head>
<body>
  <main class="screen-shell">
    <section class="screen-card screen-card-inner" aria-label="Informa&ccedil;&otilde;es da academia">
      <div class="screen-tools">
        <a class="back-link" href="{% url 'system:legacy-home' %}">Voltar</a>
      </div>

      <div class="inner-header">
        <div class="logo-frame logo-frame-small">
          <img
            class="brand-logo brand-logo-small"
            src="{% static 'system/img/logo-lv-bjj-vetorizada.png' %}"
            alt="Logo LV JIU JITSU"
          >
        </div>

        <div>
          <h1>Informa&ccedil;&otilde;es</h1>
          <p class="inner-copy">Os dados desta &aacute;rea ser&atilde;o carregados dinamicamente a partir do cadastro de turmas e hor&aacute;rios.</p>
        </div>
      </div>

      <div class="info-stack">
        <article class="info-card">
          <h2>Conte&uacute;do din&acirc;mico</h2>
          <p>Esta tela ficar&aacute; vinculada ao cadastro de turmas e hor&aacute;rios da academia.</p>
        </article>
      </div>

      <div class="screen-tools-floating" aria-hidden="false">
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Alternar tema">
          <span class="theme-toggle-track">
            <span class="theme-toggle-knob"></span>
          </span>
        </button>
      </div>
    </section>
  </main>
  <script src="{% static 'system/js/theme-toggle.js' %}"></script>
</body>
</html>
