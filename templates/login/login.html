{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LV JIU JITSU</title>
  {% include "includes/_favicon.html" %}
  <link rel="stylesheet" href="{% static 'system/css/auth/login.css' %}">
</head>
<body>
  <main class="screen-shell">
    <section class="screen-card screen-card-home" aria-label="Entrada do portal">
      <div class="screen-tools-triple" aria-hidden="false">
        <a
          class="back-link"
          href="{% url 'system:legacy-home' %}"
          onclick="if (window.history.length > 1) { window.history.back(); return false; }"
        >
          Voltar
        </a>
        <span class="screen-tools-triple-center" aria-hidden="true"></span>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Alternar tema">
          <span class="theme-toggle-track">
            <span class="theme-toggle-knob"></span>
          </span>
        </button>
      </div>

      <div class="brand-block brand-block-home">
        <div class="logo-frame logo-frame-home">
          <img
            class="brand-logo brand-logo-home"
            src="{% static 'system/img/logo-lv-bjj-vetorizada.png' %}"
            alt="Logo LV JIU JITSU"
          >
        </div>
      </div>

      <nav class="action-list" aria-label="A&ccedil;&otilde;es principais">
        <a class="action-card" href="{% url 'system:legacy-login-form' %}">
          <span class="action-title">Login</span>
          <span class="action-arrow" aria-hidden="true">&rsaquo;</span>
        </a>

        <a class="action-card" href="{% url 'system:legacy-register' %}">
          <span class="action-title">Cadastro</span>
          <span class="action-arrow" aria-hidden="true">&rsaquo;</span>
        </a>

        <a class="action-card" href="{% url 'system:legacy-info' %}">
          <span class="action-title">Turmas e Hor&aacute;rios</span>
          <span class="action-arrow" aria-hidden="true">&rsaquo;</span>
        </a>

        <a class="action-card" href="{% url 'system:product-catalog' %}">
          <span class="action-title">Materiais</span>
          <span class="action-arrow" aria-hidden="true">&rsaquo;</span>
        </a>

        <a class="action-card" href="{% url 'system:plan-catalog' %}">
          <span class="action-title">Planos</span>
          <span class="action-arrow" aria-hidden="true">&rsaquo;</span>
        </a>
      </nav>

      <a
        class="contact-cta"
        href="https://wa.me/5562999876471"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Falar com a LV pelo WhatsApp"
      >
        <span class="contact-cta-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M20.52 3.48A11.87 11.87 0 0 0 12.07 0C5.49 0 .13 5.36.13 11.95c0 2.1.55 4.15 1.59 5.96L0 24l6.27-1.64a11.88 11.88 0 0 0 5.8 1.49h.01c6.58 0 11.94-5.36 11.94-11.95 0-3.19-1.24-6.19-3.5-8.42Zm-8.45 18.35h-.01a9.9 9.9 0 0 1-5.04-1.38l-.36-.21-3.72.98.99-3.62-.24-.37a9.9 9.9 0 0 1-1.52-5.28c0-5.49 4.47-9.96 9.97-9.96 2.66 0 5.16 1.03 7.04 2.91a9.9 9.9 0 0 1 2.92 7.05c0 5.49-4.47 9.96-9.97 9.96Zm5.46-7.48c-.3-.15-1.77-.87-2.04-.96-.27-.1-.46-.15-.66.15-.19.3-.76.96-.92 1.16-.17.2-.33.22-.63.08-.3-.15-1.25-.46-2.37-1.47-.88-.79-1.47-1.77-1.64-2.06-.17-.3-.02-.46.13-.61.13-.13.3-.33.45-.49.15-.17.2-.29.3-.49.1-.2.05-.37-.03-.52-.08-.15-.66-1.58-.91-2.17-.24-.57-.48-.49-.66-.5-.17-.01-.37-.01-.57-.01-.2 0-.52.08-.79.37-.27.3-1.04 1.01-1.04 2.47s1.07 2.88 1.22 3.08c.15.2 2.1 3.21 5.08 4.5.71.31 1.27.49 1.7.63.72.23 1.37.2 1.88.12.57-.08 1.77-.72 2.03-1.42.25-.69.25-1.29.17-1.42-.08-.13-.29-.2-.6-.35Z"/>
          </svg>
        </span>
        <span>Falar com a LV</span>
      </a>

    </section>
  </main>
  <script src="{% static 'system/js/shared/theme-toggle.js' %}"></script>
</body>
</html>
