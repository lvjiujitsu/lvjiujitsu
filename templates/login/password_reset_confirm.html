{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LV JIU JITSU | Nova senha</title>
  {% include "includes/_favicon.html" %}
  <link rel="stylesheet" href="{% static 'system/css/auth/login.css' %}">
</head>
<body>
  <main class="screen-shell">
    <section class="screen-card screen-card-inner" aria-label="Definição de nova senha">
      <div class="screen-tools-with-draft">
        <a class="back-link" href="{% url 'system:legacy-login-form' %}">Voltar</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Alternar tema">
          <span class="theme-toggle-track">
            <span class="theme-toggle-knob"></span>
          </span>
        </button>
      </div>

      <div class="inner-header inner-header-horizontal">
        <div class="logo-frame logo-frame-compact">
          <img class="brand-logo" src="{% static 'system/img/logo-lv-bjj-vetorizada.png' %}" alt="Logo LV JIU JITSU">
        </div>
        <div>
          <p class="eyebrow">Recuperação</p>
          <h1>Definir nova senha</h1>
        </div>
      </div>

      <form class="form-stack" method="post" novalidate>
        {% csrf_token %}
        {% if form.non_field_errors %}
          <div class="form-errors" role="alert">
            {% for error in form.non_field_errors %}
              <p>{{ error }}</p>
            {% endfor %}
          </div>
        {% endif %}

        {% for field in form %}
          <label class="field" for="{{ field.id_for_label }}">
            <span>{{ field.label }}</span>
            <div class="password-input-wrapper">
              {{ field }}
              <button
                class="password-visibility-button"
                type="button"
                data-password-toggle
                data-target-id="{{ field.id_for_label }}"
                aria-controls="{{ field.id_for_label }}"
                aria-label="Mostrar senha"
              >
                Mostrar
              </button>
            </div>
            {% if field.errors %}
              <small class="field-error">{{ field.errors|join:", " }}</small>
            {% endif %}
          </label>
        {% endfor %}

        <button class="primary-button" type="submit">Salvar nova senha</button>
      </form>
    </section>
  </main>
  <script src="{% static 'system/js/shared/theme-toggle.js' %}"></script>
  <script src="{% static 'system/js/auth/password-toggle.js' %}"></script>
</body>
</html>
