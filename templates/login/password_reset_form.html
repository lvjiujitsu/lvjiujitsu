{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LV JIU JITSU | Recuperar senha</title>
  <link rel="stylesheet" href="{% static 'system/css/auth/login.css' %}">
</head>
<body>
  <main class="screen-shell">
    <section class="screen-card screen-card-inner" aria-label="Recuperação de senha">
      <div class="screen-tools-with-draft">
        <a class="back-link" href="{% url 'system:legacy-login-form' %}">Voltar</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Alternar tema">
          <span class="theme-toggle-track">
            <span class="theme-toggle-knob"></span>
          </span>
        </button>
      </div>

      <div class="inner-header inner-header-horizontal">
        <div class="logo-frame logo-frame-compact">
          <img class="brand-logo" src="{% static 'system/img/logo-lv-bjj-vetorizada.png' %}" alt="Logo LV JIU JITSU">
        </div>
        <div>
          <p class="eyebrow">Recuperação</p>
          <h1>Esqueci minha senha</h1>
          <p class="inner-copy">Informe seu CPF para receber o link de redefinição.</p>
        </div>
      </div>

      <form class="form-stack" method="post" novalidate>
        {% csrf_token %}
        {% if form.non_field_errors %}
          <div class="form-errors" role="alert">
            {% for error in form.non_field_errors %}
              <p>{{ error }}</p>
            {% endfor %}
          </div>
        {% endif %}

        <label class="field" for="{{ form.cpf.id_for_label }}">
          <span>{{ form.cpf.label }}</span>
          {{ form.cpf }}
          {% if form.cpf.errors %}
            <small class="field-error">{{ form.cpf.errors|join:", " }}</small>
          {% endif %}
        </label>

        <button class="primary-button" type="submit">Enviar link</button>
      </form>
    </section>
  </main>
  <script src="{% static 'system/js/shared/theme-toggle.js' %}"></script>
</body>
</html>
