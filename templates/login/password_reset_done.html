{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LV JIU JITSU | Link enviado</title>
  {% include "includes/_favicon.html" %}
  <link rel="stylesheet" href="{% static 'system/css/auth/login.css' %}?v=20260413f">
</head>
<body>
  <main class="screen-shell">
    <section class="screen-card screen-card-inner" aria-label="Link enviado">
      <div class="screen-tools-with-draft">
        <a class="back-link" href="{% url 'system:legacy-login-form' %}">Voltar</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Alternar tema">
          <span class="theme-toggle-track">
            <span class="theme-toggle-knob"></span>
          </span>
        </button>
      </div>

      <div class="inner-header inner-header-horizontal">
        <div class="logo-frame logo-frame-compact">
          <img class="brand-logo" src="{% static 'system/img/logo-lv-bjj-vetorizada.png' %}" alt="Logo LV JIU JITSU">
        </div>
        <div>
          <p class="eyebrow">Recuperação</p>
          <h1>Link enviado</h1>
          <p class="inner-copy">Se o CPF estiver cadastrado, o link foi enviado ao e-mail vinculado.</p>
        </div>
      </div>

      <a class="primary-button text-button" href="{% url 'system:legacy-login-form' %}">Voltar ao login</a>
    </section>
  </main>
  <script src="{% static 'system/js/shared/viewport-height.js' %}?v=20260413"></script>
  <script src="{% static 'system/js/shared/theme-toggle.js' %}"></script>
</body>
</html>
