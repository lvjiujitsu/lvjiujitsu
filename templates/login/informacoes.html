<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LV JIU JITSU | Informações</title>
  <link rel="stylesheet" href="../../static/system/css/login.css">
</head>
<body>
  <main class="screen-shell">
    <section class="screen-card screen-card-inner" aria-label="Informações da academia">
      <div class="screen-tools">
        <a class="back-link" href="./login.html">Voltar</a>
      </div>

      <div class="inner-header">
        <div class="logo-frame logo-frame-small">
          <img
            class="brand-logo brand-logo-small"
            src="../../static/system/img/logo-lv-bjj-vetorizada.png"
            alt="Logo LV JIU JITSU"
          >
        </div>

        <div>
          <h1>Informações</h1>
          <p class="inner-copy">Os dados desta área serão carregados dinamicamente a partir do cadastro de turmas e horários.</p>
        </div>
      </div>

      <div class="info-stack">
        <article class="info-card">
          <h2>Conteúdo dinâmico</h2>
          <p>Esta tela ficará vinculada ao cadastro de turmas e horários da academia.</p>
        </article>
      </div>

      <div class="screen-tools-floating" aria-hidden="false">
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Alternar tema">
          <span class="theme-toggle-track">
            <span class="theme-toggle-knob"></span>
          </span>
        </button>
      </div>
    </section>
  </main>
  <script src="../../static/system/js/theme-toggle.js"></script>
</body>
</html>
