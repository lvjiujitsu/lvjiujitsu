{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LV JIU JITSU | Senha redefinida</title>
  <link rel="stylesheet" href="{% static 'system/css/auth/login.css' %}">
</head>
<body>
  <main class="screen-shell">
    <section class="screen-card screen-card-inner" aria-label="Senha redefinida">
      <div class="inner-header">
        <div class="logo-frame logo-frame-small">
          <img
            class="brand-logo brand-logo-small"
            src="{% static 'system/img/logo-lv-bjj-vetorizada.png' %}"
            alt="Logo LV JIU JITSU"
          >
        </div>
        <div>
          <p class="eyebrow">Recuperação</p>
          <h1>Senha atualizada</h1>
          <p class="inner-copy">Sua senha foi redefinida. Você já pode entrar no sistema.</p>
        </div>
      </div>

      <a class="primary-button text-button" href="{% url 'system:legacy-login-form' %}">Ir para o login</a>
    </section>
  </main>
</body>
</html>
