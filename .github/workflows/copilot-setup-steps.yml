name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: windows-latest
    timeout-minutes: 59
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }

      - name: Install Playwright Chromium
        shell: pwsh
        run: |
          playwright install chromium

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Playwright MCP
        shell: pwsh
        run: |
          npx -y @playwright/mcp --help

      - name: Validate Context7 MCP
        shell: pwsh
        run: |
          npx -y @upstash/context7-mcp --help

      - name: Validate headless browser
        shell: pwsh
        run: |
          python -c "from playwright.sync_api import sync_playwright; p=sync_playwright().start(); b=p.chromium.launch(headless=True); page=b.new_page(); page.goto('https://example.com', wait_until='domcontentloaded'); print('TITLE=' + page.title()); b.close(); p.stop()"
